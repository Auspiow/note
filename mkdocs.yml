site_name: Auspiow's note
site_url: https://auspiow.github.io/note/
repo_url: https://github.com/auspiow/note
repo_name: auspiow/note

plugins:
  - search
  - git-revision-date-localized:
      enable_creation_date: true
  - rss:
      enabled: true
  - encryptcontent:
      password_inventory:
        secret: !ENV ENCRYPTCONTENT_PASSWORD
      threshold_warning_min_entropy: 0
  - statistics:
      page_statistics: true
      page_read_time: true
      page_images: false
      page_template: templates/page_statistics.md
      words_per_minute: 300
      codelines_per_minute: 80

markdown_extensions:
  - nl2br
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.arithmatex:
      generic: true
      smart_dollar: false
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.tasklist:
      custom_checkbox: true

extra_css:
  - https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.7/katex.min.css
  - https://cdn.tonycrane.cc/jbmono/jetbrainsmono.css
  - https://cdn.tonycrane.cc/lxgw/lxgwscreen.css
  - stylesheets/extra.css
extra_javascript:
  - https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.7/katex.min.js
  - https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.7/contrib/auto-render.min.js
  - javascripts/katex.js

theme:
  name: material
  font: false
  logo: images/favicon.svg
  favicon: images/favicon.svg
  language: zh
  palette: 
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: grey
      accent: grey
      toggle:
        icon: material/brightness-7
        help: 切换到深色模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: grey
      accent: grey
      toggle:
        icon: material/brightness-4
        help: 切换到浅色模式
  features:
    - navigation.tabs
    - navigation.indexes
    - search.suggest
    - search.highlight

nav:
  - Home: index.md
  - ZJU-Design:
      - 首页: ZJU-Design/index.md
      - 感知、通信与控制:
          - 传感器: ZJU-Design/感知、通信与控制/传感器.md
          - 通信概述: ZJU-Design/感知、通信与控制/通信概述.md
          - 蓝牙通信: ZJU-Design/感知、通信与控制/蓝牙通信.md
          - WiFi与以太网: ZJU-Design/感知、通信与控制/WiFi与以太网.md
          - I2C-SPI-USB通信: ZJU-Design/感知、通信与控制/I2C-SPI-USB通信.md
  - CTF:
      - Web:
          - Java安全: ctf/web/Java安全.md
      - Writeups:
          - AliyunCTF 2026: ctf/writeups/Aliyun2026.md
          - ZJUBus-Web: ctf/writeups/zjubus-web.md
  - CS:
      - Frontend:
          - JavaScript1: cs/frontend/JS1.md
          - 浏览器: cs/frontend/浏览器.md
          - CSS: cs/frontend/CSS.md
      - Rev:
          - Android: cs/rev/Android.md
          - Web-JS: cs/rev/Web-JS.md
      - Assembly:
          - x86: cs/assembly/x86.md
          - wasm: cs/assembly/Wasm.md
      - Crawler:
            - JS逆向: cs/crawler/JS逆向.md